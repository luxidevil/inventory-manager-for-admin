kind = "web"
previewPath = "/"
title = "Bulk Inventory Manager"
version = "1.0.0"
id = "artifacts/bulk-inventory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20525

[services.development]
run = "pnpm --filter @workspace/bulk-inventory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bulk-inventory", "run", "build" ]
publicDir = "artifacts/bulk-inventory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20525"
BASE_PATH = "/"
